<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>FitPlan AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0b0b;
  color:#fff;
}

.wrap {
  max-width:620px;
  margin:auto;
  padding:30px 18px 80px;
}

h1 { text-align:center; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card {
  background:#161616;
  border:1.5px solid #2a2a2a;
  border-radius:16px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card.active {
  border-color:#c8f045;
  box-shadow:0 0 10px rgba(200,240,69,0.3);
}

.btn {
  padding:12px 22px;
  border-radius:999px;
  font-weight:700;
  border:none;
  cursor:pointer;
  margin-top:20px;
}

.primary { background:#c8f045; color:#000; }
.secondary { background:#1e1e1e; color:#aaa; }

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #2a2a2a;
  background:#161616;
  color:#fff;
  margin-top:10px;
}

.plan {
  background:#161616;
  padding:20px;
  border-radius:16px;
  border:1px solid #2a2a2a;
}

.progressBar {
  height:6px;
  background:#1e1e1e;
  border-radius:999px;
  margin:10px 0;
}

.progressFill {
  height:100%;
  background:#c8f045;
  border-radius:999px;
}
</style>
</head>

<body>
<div class="wrap">
<h1>FitPlan AI</h1>
<div id="app"></div>
</div>

<script>
const state = {
  step: 0,
  user: null,
  answers: {},
  plan: null,
  done: []
};

const GOALS = {
  kobieta: ["posladki","brzuch","ramiona","redukcja"],
  mezczyzna: ["klatka","plecy","nogi","masa"]
};

const PLANS = {
  posladki: [
    "Hip Thrust 4x12",
    "RDL 4x10",
    "Wykroki 3x12",
    "Kickback 3x15"
  ],
  brzuch: [
    "Plank 4x40s",
    "Dead Bug",
    "Russian Twist",
    "Leg Raises"
  ],
  klatka: [
    "Bench Press 5x5",
    "Incline DB",
    "Dipy",
    "Rozpiętki"
  ],
  plecy: [
    "Podciąganie",
    "Wiosłowanie",
    "Face Pull",
    "Lat Pulldown"
  ],
  masa: [
    "Przysiad",
    "Martwy ciąg",
    "Bench Press",
    "OHP"
  ],
  redukcja: [
    "HIIT 20 min",
    "Full Body",
    "Cardio",
    "Core"
  ]
};

// ─── LOGIN ───
function login(){
  const name = document.getElementById("name").value;
  if(!name) return alert("Podaj imię");

  state.user = {name};
  localStorage.setItem("user", JSON.stringify(state.user));
  state.step = 1;
  render();
}

// ─── SELECT ───
function select(step,val){
  state.answers[step]=val;
  render();
}

// ─── GENERATE ───
function generate(){
  const goal = state.answers[2];
  const waga = state.answers[3];

  const kcal = Math.round(waga * 30);
  const exercises = PLANS[goal] || [];

  state.plan = { goal, kcal, exercises };
  state.done = [];

  localStorage.setItem("plan", JSON.stringify(state.plan));
  localStorage.setItem("done", JSON.stringify(state.done));

  renderPlan();
}

// ─── CHECKBOX ───
function toggle(i){
  if(state.done.includes(i)){
    state.done = state.done.filter(x => x!==i);
  } else {
    state.done.push(i);
  }

  localStorage.setItem("done", JSON.stringify(state.done));
  renderPlan();
}

// ─── PLAN VIEW ───
function renderPlan(){
  const app = document.getElementById("app");

  const done = state.done.length;
  const total = state.plan.exercises.length;
  const percent = Math.round((done/total)*100);

  app.innerHTML = `
    <div class="plan">
      <h2>🔥 Twój plan</h2>
      <p>${state.user.name}</p>
      <p>Kcal: ${state.plan.kcal}</p>

      <div class="progressBar">
        <div class="progressFill" style="width:${percent}%"></div>
      </div>
      <p>${percent}% ukończone</p>

      ${state.plan.exercises.map((e,i)=>`
        <div onclick="toggle(${i})" 
          style="padding:10px; margin:6px 0; cursor:pointer; border-radius:10px;
          background:${state.done.includes(i)?"#c8f04522":"#111"}">
          ${state.done.includes(i)?"✔️":""} ${e}
        </div>
      `).join("")}

      <button class="btn primary" onclick="reset()">Nowy plan</button>
    </div>
  `;
}

// ─── RENDER ───
function render(){
  const app = document.getElementById("app");

  if(!state.user){
    app.innerHTML = `
      <input id="name" placeholder="Imię">
      <button class="btn primary" onclick="login()">Start</button>
    `;
    return;
  }

  if(state.step===1){
    app.innerHTML = `
      <h2>Płeć</h2>
      <div class="grid">
        <div class="card" onclick="select(1,'kobieta')">👩</div>
        <div class="card" onclick="select(1,'mezczyzna')">👨</div>
      </div>
      <button class="btn primary" onclick="state.step=2;render()">Dalej</button>
    `;
  }

  if(state.step===2){
    const goals = GOALS[state.answers[1]] || [];
    app.innerHTML = `
      <h2>Cel</h2>
      <div class="grid">
        ${goals.map(g=>`<div class="card" onclick="select(2,'${g}')">${g}</div>`).join("")}
      </div>
      <button class="btn primary" onclick="state.step=3;render()">Dalej</button>
    `;
  }

  if(state.step===3){
    app.innerHTML = `
      <h2>Waga</h2>
      <input id="w" placeholder="kg">
      <button class="btn primary" onclick="state.answers[3]=w.value;generate()">Generuj</button>
    `;
  }
}

// ─── RESET ───
function reset(){
  localStorage.removeItem("plan");
  localStorage.removeItem("done");
  state.step=1;
  state.answers={};
  render();
}

// ─── INIT ───
const savedUser = localStorage.getItem("user");
const savedPlan = localStorage.getItem("plan");
const savedDone = localStorage.getItem("done");

if(savedUser){
  state.user = JSON.parse(savedUser);
}

if(savedPlan){
  state.plan = JSON.parse(savedPlan);
  state.done = JSON.parse(savedDone) || [];
  renderPlan();
} else {
  render();
}
</script>

</body>
</html>
