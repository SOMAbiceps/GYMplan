<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym App</title>

<style>
:root {
  --bg:#f2f2f5;
  --card:#ffffff;
  --accent:#111;
  --muted:#777;
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
  color:#111;
}

/* CONTAINER */
.app {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

h1 {
  font-size:28px;
}

/* BUTTON */
.btn {
  background:#111;
  color:white;
  border:none;
  padding:14px 18px;
  border-radius:14px;
  font-size:16px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:18px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover {
  transform:translateY(-3px);
}

/* EXERCISE */
.exercise {
  padding:18px;
  border-radius:14px;
  border:1px solid #eee;
  margin-bottom:12px;
}

input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* TIMER */
.timer {
  text-align:center;
  margin-top:20px;
}

.time {
  font-size:48px;
  font-weight:bold;
}

.controls button {
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>Trening</h1>
<button class="btn" onclick="logout()">Wyloguj</button>
</div>

<div id="login">
<input id="user" placeholder="Twoje imię">
<button class="btn" onclick="login()">Start</button>
</div>

<div id="main" style="display:none;">

<div class="grid">
<div class="card" onclick="load('push')">Push</div>
<div class="card" onclick="load('pull')">Pull</div>
<div class="card" onclick="load('legs')">Legs</div>
<div class="card" onclick="load('upper')">Upper</div>
<div class="card" onclick="load('lower')">Lower</div>
</div>

<div id="workout"></div>

</div>

</div>

<script>

let user = localStorage.getItem("user");

if(user){
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
}

function login(){
  let name=document.getElementById("user").value;
  if(!name) return;
  localStorage.setItem("user",name);
  location.reload();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

const plans={
push:[["Bench",4,8],["Incline",4,10],["Shoulder",4,8]],
pull:[["Pull",4,8],["Row",4,8],["Biceps",4,10]],
legs:[["Squat",4,8],["Press",4,10],["Calves",5,15]],
upper:[["Bench",4,8],["Row",4,10]],
lower:[["Squat",4,8],["RDL",4,8]]
};

function load(type){

  let html=`<div class="card"><h2>${type.toUpperCase()}</h2>`;

  plans[type].forEach(ex=>{
    html+=`
    <div class="exercise">
      <b>${ex[0]}</b><br>
      ${ex[1]}x${ex[2]}
      <input placeholder="kg">
      <input placeholder="powtórzenia">
    </div>`;
  });

  html+=`
  <div class="timer">
    <div class="time" id="time">60</div>
    <div class="controls">
      <button onclick="start()">▶</button>
      <button onclick="pause()">⏸</button>
      <button onclick="add(10)">+10</button>
      <button onclick="reset()">reset</button>
    </div>
  </div></div>`;

  document.getElementById("workout").innerHTML=html;
}

/* TIMER */
let t=60, i=null;

function update(){ document.getElementById("time").innerText=t; }

function start(){
  if(i) return;
  i=setInterval(()=>{
    t--; update();
    if(t<=0){ clearInterval(i); i=null; }
  },1000);
}

function pause(){
  clearInterval(i); i=null;
}

function add(x){
  t+=x; update();
}

function reset(){
  t=60; update();
  clearInterval(i); i=null;
}

</script>

</body>
</html>
