<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym App Pro</title>

<style>
:root{
--bg:#f0f0f0;
--card:#ffffff;
--accent:#ff3b3b;
}

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
}

/* LOGIN */
#login{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:bold;
cursor:pointer;
}

/* APP */
#app{display:none;}

.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:white;
padding:15px;
height:100vh;
overflow:auto;
}

.user{
padding:10px;
border-radius:10px;
margin-bottom:5px;
background:#eee;
cursor:pointer;
}

.user.active{
background:var(--accent);
color:white;
}

.main{
flex:1;
padding:20px;
}

/* SPLIT */
.split button{
margin:5px;
}

/* EXERCISE */
.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.set{
display:flex;
gap:5px;
margin-top:5px;
}

.set input{
flex:1;
}

/* TIMER */
.timer{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:20px;
border-radius:50%;
display:none;
font-size:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>Konto</h2>
<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Hasło">
<input id="weight" placeholder="Waga">
<input id="height" placeholder="Wzrost">

<select id="goal">
<option value="mass">Masa</option>
<option value="cut">Redukcja</option>
<option value="strength">Siła</option>
</select>

<button id="startBtn">Start</button>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="container">

<div class="sidebar">
<h4>Konta</h4>
<div id="usersList"></div>
<button onclick="logout()">Wyloguj</button>
</div>

<div class="main">

<h3 id="welcome"></h3>

<div class="split">
<button data-split="ppl">Push/Pull/Legs</button>
<button data-split="ul">Upper/Lower</button>
</div>

<div id="days"></div>

<div id="plan"></div>

</div>

</div>
</div>

<div id="timer" class="timer">60</div>

<script>

const loginDiv=document.getElementById("login");
const appDiv=document.getElementById("app");
const startBtn=document.getElementById("startBtn");
const usersList=document.getElementById("usersList");
const welcome=document.getElementById("welcome");
const planDiv=document.getElementById("plan");
const daysDiv=document.getElementById("days");
const timer=document.getElementById("timer");

let currentUserName=null;
let currentUser=null;
let split="ppl";

/* LOGIN */
startBtn.addEventListener("click", ()=>{
const u=user.value;
const p=pass.value;

if(!u||!p) return alert("Dane");

let users=JSON.parse(localStorage.getItem("users")||"{}");

users[u]={
pass:p,
weight:weight.value,
height:height.value,
goal:goal.value,
progress:{}
};

localStorage.setItem("users",JSON.stringify(users));

loadUsers();
selectUser(u);
});

/* USERS */
function loadUsers(){
usersList.innerHTML="";
let users=JSON.parse(localStorage.getItem("users")||"{}");

Object.keys(users).forEach(name=>{
let div=document.createElement("div");
div.className="user";
div.innerText=name;

div.onclick=()=>selectUser(name);

usersList.appendChild(div);
});
}

function selectUser(name){
let users=JSON.parse(localStorage.getItem("users"));
currentUserName=name;
currentUser=users[name];

loginDiv.style.display="none";
appDiv.style.display="block";

welcome.innerText=name+" | "+currentUser.goal;

generateDays();
}

/* SPLIT */
document.querySelectorAll(".split button").forEach(btn=>{
btn.onclick=()=>{
split=btn.dataset.split;
generateDays();
};
});

/* DAYS */
function generateDays(){
daysDiv.innerHTML="";

let days=split==="ppl"
?["push","pull","legs"]
:["upper","lower"];

days.forEach(d=>{
let b=document.createElement("button");
b.innerText=d;
b.onclick=()=>loadPlan(d);
daysDiv.appendChild(b);
});
}

/* PLAN */
function loadPlan(day){
planDiv.innerHTML="";

let exercises={
push:["Bench","Incline","Shoulder","Lateral","Triceps"],
pull:["Pull","Row","Lat","Face Pull","Biceps"],
legs:["Squat","Deadlift","Curl","Calf"],
upper:["Bench","Row","Shoulder","Pull","Arms"],
lower:["Squat","Deadlift","Leg Curl","Calf"]
};

exercises[day].forEach(ex=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`<h4>${ex}</h4>`;

for(let i=0;i<3;i++){
let set=document.createElement("div");
set.className="set";

set.innerHTML=`
<input placeholder="kg">
<input placeholder="powt.">
<button class="startSet">▶</button>
`;

set.querySelector(".startSet").addEventListener("click", startTimer);

div.appendChild(set);
}

planDiv.appendChild(div);
});
}

/* TIMER */
function startTimer(){
let time=60;
timer.style.display="block";
timer.innerText=time;

let t=setInterval(()=>{
time--;
timer.innerText=time;

if(time<=0){
clearInterval(t);
timer.style.display="none";
}
},1000);
}

/* LOGOUT */
function logout(){
loginDiv.style.display="flex";
appDiv.style.display="none";
}

/* INIT */
loadUsers();

</script>

</body>
</html>
