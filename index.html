<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan 3.1</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#1f1f1f;
  color:#fff;
}

/* LAYOUT */
.app{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#181818;
  height:100vh;
  padding:20px;
  box-sizing:border-box;
}

.sidebar h2{
  margin:0 0 20px;
}

.plan-item{
  padding:12px;
  background:#222;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* BUTTON */
.btn{
  padding:14px;
  background:#00ff88;
  color:#000;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* CARD */
.card{
  background:#2a2a2a;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

/* TRAINING SELECT */
.training-select{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.training-btn{
  background:#333;
  padding:18px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  font-weight:700;
}

.training-btn:hover{
  background:#00ff88;
  color:#000;
}

/* EXERCISE */
.exercise{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.timer{
  margin-top:10px;
  font-size:14px;
  color:#00ff88;
}

</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>📁 Twoje plany</h2>
    <div id="savedPlans"></div>
    <button class="btn" onclick="newPlan()">+ Nowy plan</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- START -->
    <div id="start">
      <h1>FitPlan</h1>
      <p>Stwórz plan treningowy</p>
      <button class="btn" onclick="generatePlan()">START</button>
    </div>

    <!-- SELECT DAY -->
    <div id="selectDay" style="display:none;">
      <h2>Co dziś robisz?</h2>
      <div class="training-select" id="trainingButtons"></div>
    </div>

    <!-- TRAINING VIEW -->
    <div id="trainingView"></div>

  </div>
</div>

<script>

let currentPlan = null;

// GENERATE PLAN
function generatePlan(){

  currentPlan = {
    name:"Plan PUSH/PULL/LEGS",
    trainings:{
      push:[
        {name:"Wyciskanie sztangi", sets:4, reps:"6-10"},
        {name:"Wyciskanie hantli", sets:4, reps:"8-12"},
        {name:"Dipy", sets:3, reps:"max"},
        {name:"Unoszenie bokiem", sets:4, reps:"12-15"},
        {name:"Triceps linka", sets:3, reps:"12-15"}
      ],
      pull:[
        {name:"Podciąganie", sets:4, reps:"max"},
        {name:"Wiosłowanie sztangą", sets:4, reps:"8-10"},
        {name:"Ściąganie drążka", sets:3, reps:"10-12"},
        {name:"Face pull", sets:3, reps:"15"},
        {name:"Biceps hantle", sets:3, reps:"10-12"}
      ],
      legs:[
        {name:"Przysiad", sets:5, reps:"5"},
        {name:"Leg press", sets:4, reps:"10"},
        {name:"Martwy RDL", sets:4, reps:"10"},
        {name:"Łydki", sets:4, reps:"15"},
        {name:"Hip thrust", sets:4, reps:"12"}
      ]
    }
  };

  document.getElementById("start").style.display="none";
  document.getElementById("selectDay").style.display="block";

  renderTrainingButtons();
  savePlan();
}

// BUTTONS
function renderTrainingButtons(){
  const container = document.getElementById("trainingButtons");
  container.innerHTML="";

  Object.keys(currentPlan.trainings).forEach(type=>{
    const btn = document.createElement("div");
    btn.className="training-btn";
    btn.innerText=type.toUpperCase();
    btn.onclick=()=>showTraining(type);
    container.appendChild(btn);
  });
}

// SHOW TRAINING
function showTraining(type){

  const view = document.getElementById("trainingView");
  view.innerHTML = `<h2>${type.toUpperCase()}</h2>`;

  currentPlan.trainings[type].forEach(ex=>{
    const div = document.createElement("div");
    div.className="exercise";

    div.innerHTML = `
      <strong>${ex.name}</strong><br>
      ${ex.sets} serie × ${ex.reps}
      <div class="timer" onclick="startTimer(this)">⏱ Start timer</div>
    `;

    view.appendChild(div);
  });
}

// TIMER
function startTimer(el){
  let time = 60;
  el.innerText = "60s";

  const interval = setInterval(()=>{
    time--;
    el.innerText = time+"s";
    if(time<=0){
      clearInterval(interval);
      el.innerText="✔ Gotowe";
    }
  },1000);
}

// SAVE
function savePlan(){
  let plans = JSON.parse(localStorage.getItem("plans") || "[]");
  plans.push(currentPlan);
  localStorage.setItem("plans", JSON.stringify(plans));
  renderSaved();
}

// LOAD
function renderSaved(){
  const container = document.getElementById("savedPlans");
  container.innerHTML="";

  let plans = JSON.parse(localStorage.getItem("plans") || "[]");

  plans.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="plan-item";
    div.innerText = p.name;
    div.onclick=()=>{
      currentPlan=p;
      document.getElementById("start").style.display="none";
      document.getElementById("selectDay").style.display="block";
      renderTrainingButtons();
    };
    container.appendChild(div);
  });
}

// NEW PLAN
function newPlan(){
  document.getElementById("start").style.display="block";
  document.getElementById("selectDay").style.display="none";
  document.getElementById("trainingView").innerHTML="";
}

// INIT
renderSaved();

</script>

</body>
</html>
