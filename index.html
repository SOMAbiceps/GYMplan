<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#2b2b2f;
  color:#fff;
}

.app{
  max-width:650px;
  margin:auto;
  padding:30px 20px 120px;
}

h1{font-size:36px;margin-bottom:5px}
.sub{color:#aaa;margin-bottom:20px}

.progress{height:6px;background:#444;border-radius:10px;margin-bottom:25px}
.bar{height:100%;width:20%;background:#00ffae;border-radius:10px;transition:.4s}

.step{display:none}
.step.active{display:block}

.grid{display:grid;gap:14px}

.card{
  background:#3a3a3f;
  padding:22px;
  border-radius:18px;
  border:2px solid transparent;
  cursor:pointer;
  font-size:18px;
}
.card.active{border-color:#00ffae;background:#3f4a47}

.btn{
  width:100%;
  margin-top:20px;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#00ffae;
  color:#000;
  font-weight:800;
  font-size:16px;
}
.btn:disabled{background:#555;color:#999}

.section{
  background:#3a3a3f;
  padding:20px;
  border-radius:20px;
  margin-bottom:16px;
}

.exercise{
  padding:12px 0;
  border-bottom:1px solid #555;
  font-size:15px;
}

.day{
  margin-top:10px;
  padding:12px;
  background:#2f2f34;
  border-radius:12px;
  border-left:5px solid #00ffae;
}

.level{
  margin-top:12px;
}
</style>
</head>

<body>

<div class="app">

<h1>FitPlan</h1>
<div class="sub">Profesjonalny plan treningowy</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>Płeć</h2>
<div class="grid">
<div class="card" onclick="select(1,'kobieta',this)">👩 Kobieta</div>
<div class="card" onclick="select(1,'mezczyzna',this)">👨 Mężczyzna</div>
</div>
<button class="btn" id="next1" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>Cel</h2>
<div class="grid" id="goals"></div>
<button class="btn" id="next2" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>Poziom</h2>
<div class="grid">
<div class="card" onclick="select(3,'poczatkujacy',this)">Początkujący</div>
<div class="card" onclick="select(3,'sredni',this)">Średni</div>
<div class="card" onclick="select(3,'zaawansowany',this)">Zaawansowany</div>
</div>
<button class="btn" id="next3" disabled onclick="finish()">Generuj plan</button>
</div>

<!-- RESULT -->
<div class="step" id="result"></div>

</div>

<script>
let step=1;
let answers={};

const GOALS={
kobieta:["🍑 Pośladki","💪 Góra ciała","🦵 Dół ciała","✨ Całe ciało"],
mezczyzna:["💪 Góra ciała","🦵 Nogi","🔥 Masa","⚡ Całe ciało"]
};

function select(s,val,el){
answers[s]=val;
document.querySelectorAll(`#step${s} .card`).forEach(c=>c.classList.remove("active"));
el.classList.add("active");
document.getElementById("next"+s).disabled=false;
if(s===1) renderGoals();
}

function renderGoals(){
let box=document.getElementById("goals");
box.innerHTML="";
GOALS[answers[1]].forEach(g=>{
let d=document.createElement("div");
d.className="card";
d.innerText=g;
d.onclick=()=>select(2,g,d);
box.appendChild(d);
});
}

function next(){
document.getElementById("step"+step).classList.remove("active");
step++;
document.getElementById("step"+step).classList.add("active");
document.getElementById("bar").style.width=(step*33)+"%";
}

function finish(){
document.getElementById("step"+step).classList.remove("active");
document.getElementById("result").classList.add("active");

let html="";

html+=createLevel("Początkujący",[
["Dzień 1 – Full Body","Przysiad 3x12","Wyciskanie hantli 3x12","Wiosłowanie 3x12","Hip thrust 3x12","Plank 3x30s"],
["Dzień 2 – Full Body","Martwy ciąg 3x10","Pompki 3x10","Ściąganie drążka 3x12","Wykroki 3x10","Brzuch 3x15"]
]);

html+=createLevel("Średni",[
["Dzień 1 – Góra","Wyciskanie sztangi 4x8","Podciąganie 4x8","OHP 3x10","Biceps 3x12","Triceps 3x12"],
["Dzień 2 – Dół","Przysiad 4x8","RDL 4x10","Leg press 3x12","Łydki 4x15"],
["Dzień 3 – Mix","Hip thrust 4x10","Wiosłowanie 4x10","Face pull 3x15","Core 3x15"]
]);

html+=createLevel("Zaawansowany",[
["Push","Bench press 5x5","Incline DB 4x8","OHP 4x8","Triceps 4x12"],
["Pull","Podciąganie 5x5","Wiosłowanie 4x8","Face pull 4x15","Biceps 4x12"],
["Legs","Przysiad 5x5","RDL 4x8","Leg press 4x12","Łydki 5x15"]
]);

document.getElementById("result").innerHTML=html;
}

function createLevel(name,days){
let html=`<div class="section"><h2>${name}</h2>`;
days.forEach(d=>{
html+=`<div class="day"><b>${d[0]}</b>`;
d.slice(1).forEach(e=>{
html+=`<div class="exercise">${e}</div>`;
});
html+=`</div>`;
});
html+=`</div>`;
return html;
}
</script>

</body>
</html>
