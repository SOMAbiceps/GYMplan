<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitPlan Pro</title>

<style>
:root {
  --bg: #111;
  --card: #1b1b1b;
  --border: #2a2a2a;
  --text: #f5f5f5;
  --sub: #888;
  --accent: #00e0ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  transition: 0.2s;
}

.title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 10px;
}

.btn {
  padding: 14px;
  border-radius: 999px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  background: var(--accent);
  color: #000;
  width: 100%;
  font-size: 16px;
  margin-top: 10px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option {
  padding: 18px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
}

.option.active {
  border-color: var(--accent);
  background: rgba(0,224,255,0.08);
}

.small { font-size: 13px; color: var(--sub); }

input {
  width: 100%;
  padding: 12px;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: white;
  margin-top: 8px;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
let state = JSON.parse(localStorage.getItem("fitapp")) || {
  user: null,
  plan: null,
  progress: {}
};

function save() {
  localStorage.setItem("fitapp", JSON.stringify(state));
}

function setUser(data) {
  state.user = data;
  save();
  renderDashboard();
}

function selectOption(el, key, value) {
  document.querySelectorAll(`[data-${key}]`).forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  state[key] = value;
}

function generatePlan() {
  const plan = {
    name: "Plan: Góra ciała (siła + masa)",
    workouts: [
      {
        name: "Push",
        exercises: [
          { name: "Wyciskanie sztangi", sets: 5, reps: "5" },
          { name: "Wyciskanie hantli skos", sets: 4, reps: "10" },
          { name: "OHP", sets: 4, reps: "8" },
          { name: "Dipy", sets: 3, reps: "max" },
          { name: "Triceps linka", sets: 3, reps: "12" }
        ]
      },
      {
        name: "Pull",
        exercises: [
          { name: "Podciąganie", sets: 4, reps: "max" },
          { name: "Wiosłowanie sztangą", sets: 5, reps: "5" },
          { name: "Face pull", sets: 3, reps: "15" },
          { name: "Biceps hantle", sets: 3, reps: "12" }
        ]
      }
    ]
  };

  state.plan = plan;
  save();
  renderPlan();
}

function renderAuth() {
  app.innerHTML = `
    <div class="card">
      <div class="title">Stwórz konto</div>
      <input id="name" placeholder="Imię">
      <input id="weight" placeholder="Waga (kg)">
      <button class="btn" onclick="setUser({
        name: name.value,
        weight: weight.value
      })">Start</button>
    </div>
  `;
}

function renderDashboard() {
  app.innerHTML = `
    <div class="card">
      <div class="title">Cześć ${state.user.name} 👋</div>
      <div class="small">Twoja waga: ${state.user.weight} kg</div>
    </div>

    <div class="card">
      <div class="title">Twój plan</div>
      <button class="btn" onclick="renderGenerator()">Generuj plan</button>
    </div>
  `;
}

function renderGenerator() {
  app.innerHTML = `
    <div class="card">
      <div class="title">Wybierz cel</div>
      <div class="grid">
        <div class="option" onclick="selectOption(this,'goal','gora')" data-goal>Góra</div>
        <div class="option" onclick="selectOption(this,'goal','dol')" data-goal>Dół</div>
        <div class="option" onclick="selectOption(this,'goal','masa')" data-goal>Masa</div>
        <div class="option" onclick="selectOption(this,'goal','redukcja')" data-goal>Redukcja</div>
      </div>
      <button class="btn" onclick="generatePlan()">Generuj</button>
    </div>
  `;
}

function renderPlan() {
  const p = state.plan;

  app.innerHTML = `
    <div class="card">
      <div class="title">${p.name}</div>
      <button class="btn" onclick="startWorkout()">Start trening</button>
    </div>
    ${p.workouts.map(w => `
      <div class="card">
        <b>${w.name}</b>
        ${w.exercises.map(e => `
          <div style="margin-top:8px;">
            ${e.name} — ${e.sets} x ${e.reps}
          </div>
        `).join("")}
      </div>
    `).join("")}
  `;
}

let currentWorkout = 0;
let currentExercise = 0;

function startWorkout() {
  currentWorkout = 0;
  currentExercise = 0;
  renderWorkout();
}

function renderWorkout() {
  const w = state.plan.workouts[currentWorkout];
  const e = w.exercises[currentExercise];

  app.innerHTML = `
    <div class="card">
      <div class="title">${w.name}</div>
      <div style="font-size:22px;margin:10px 0;">${e.name}</div>
      <div>${e.sets} serii x ${e.reps}</div>
      <input placeholder="Ciężar (kg)" id="kg">
      <button class="btn" onclick="nextExercise()">Dalej</button>
    </div>
  `;
}

function nextExercise() {
  currentExercise++;
  const w = state.plan.workouts[currentWorkout];

  if (currentExercise >= w.exercises.length) {
    currentWorkout++;
    currentExercise = 0;
  }

  if (currentWorkout >= state.plan.workouts.length) {
    renderDashboard();
    return;
  }

  renderWorkout();
}

function init() {
  if (!state.user) return renderAuth();
  if (!state.plan) return renderDashboard();
  renderPlan();
}

init();
</script>
</body>
