<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Pro</title>

<style>
:root{
--bg:#f2f2f2;
--card:#fff;
--accent:#ff3b3b;
}

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
}

input, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-weight:bold;
}

/* APP */
#app{display:none;}

header{
padding:20px;
font-weight:bold;
}

.plan-type{
display:flex;
gap:10px;
padding:10px 20px;
}

.plan-type div{
padding:10px;
background:white;
border-radius:10px;
cursor:pointer;
}

.active{
background:var(--accent)!important;
color:white;
}

.main{
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
}

.timer{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:20px;
border-radius:50%;
display:none;
}
</style>
</head>

<body>

<div id="login">
<div class="box">
<h2>Stwórz konto</h2>
<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Hasło">

<input id="weight" placeholder="Waga (kg)">
<input id="height" placeholder="Wzrost (cm)">

<select id="goal">
<option value="mass">Masa</option>
<option value="cut">Redukcja</option>
<option value="strength">Siła</option>
</select>

<button onclick="login()">Start</button>
</div>
</div>

<div id="app">
<header id="welcome"></header>

<div class="plan-type">
<div onclick="setSplit('ppl')">Push/Pull/Legs</div>
<div onclick="setSplit('ul')">Upper/Lower</div>
</div>

<div class="main" id="plan"></div>
</div>

<div id="timer" class="timer">60</div>

<script>

let currentUser;
let split="ppl";

/* LOGIN */
function login(){
const u=user.value;
const p=pass.value;

if(!u||!p) return alert("Uzupełnij dane");

let users=JSON.parse(localStorage.getItem("users")||"{}");

users[u]={
pass:p,
weight:weight.value,
height:height.value,
goal:goal.value
};

localStorage.setItem("users",JSON.stringify(users));

currentUser=users[u];

startApp(u);
}

function startApp(name){
login.style.display="none";
app.style.display="block";

welcome.innerText="Cześć "+name+" | Cel: "+currentUser.goal;
}

/* SPLIT */
function setSplit(type){
split=type;
document.querySelectorAll(".plan-type div").forEach(el=>el.classList.remove("active"));
event.target.classList.add("active");
generatePlan();
}

/* PLAN GENERATOR */
function generatePlan(){
plan.innerHTML="";

let exercises=[];

if(split==="ppl"){
exercises=[
"Bench Press","Incline DB Press","Shoulder Press","Lateral Raise","Triceps",
"Pull Ups","Row","Lat Pulldown","Face Pull","Biceps",
"Squat","Deadlift","Leg Curl","Calf"
];
}else{
exercises=[
"Bench","Row","Shoulders","Pull","Arms",
"Squat","Deadlift","Leg Curl","Calf"
];
}

/* PERSONALIZACJA */
if(currentUser.goal==="mass"){
exercises.push("Heavy Set x5");
}
if(currentUser.goal==="cut"){
exercises.push("Cardio 15min");
}
if(currentUser.goal==="strength"){
exercises.push("5x5 Power");
}

exercises.forEach(ex=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>${ex}</h3>
<input placeholder="kg">
<input placeholder="powtórzenia">
<button onclick="startTimer()">Start</button>
`;

plan.appendChild(div);
});
}

/* TIMER */
function startTimer(){
let time=60;
timer.style.display="block";
timer.innerText=time;

let t=setInterval(()=>{
time--;
timer.innerText=time;
if(time<=0){
clearInterval(t);
timer.style.display="none";
}
},1000);
}

</script>

</body>
</html>
