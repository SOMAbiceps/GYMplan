<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan 6.0</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#1f1f1f;
color:#fff;
}

/* CENTER */
.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* CARD */
.card{
background:#2a2a2a;
padding:20px;
border-radius:18px;
width:100%;
max-width:420px;
margin-bottom:15px;
}

/* BUTTON */
.btn{
background:#00ff88;
border:none;
padding:14px;
border-radius:12px;
font-weight:700;
cursor:pointer;
width:100%;
margin-top:10px;
}

/* OPTION */
.option{
background:#333;
padding:14px;
border-radius:12px;
margin-bottom:10px;
text-align:center;
cursor:pointer;
}

.option:hover{
background:#00ff88;
color:#000;
}

/* EXERCISE */
.exercise{
background:#262626;
padding:12px;
border-radius:12px;
margin-top:10px;
}

/* SET */
.set{
background:#333;
padding:8px;
border-radius:8px;
margin-top:6px;
text-align:center;
cursor:pointer;
}

.done{
background:#00ff88;
color:#000;
}

/* TIMER */
.timerBox{
font-size:50px;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

// ===== USERS =====
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentUser = null;

// ===== START =====
function start(){
renderUsers();
}

// ===== USERS LIST =====
function renderUsers(){
app.innerHTML = `<div class="center">
<h1>FitPlan</h1>
<div class="card">
<h3>Konta</h3>
${users.map(u=>`<div class="option" onclick="login('${u.name}')">${u.name}</div>`).join("")}
<input id="newUser" placeholder="Nowe konto">
<button class="btn" onclick="createUser()">Dodaj konto</button>
</div>
</div>`;
}

// ===== CREATE USER =====
function createUser(){
let name = document.getElementById("newUser").value;
if(!name) return;

users.push({name});
localStorage.setItem("users", JSON.stringify(users));
renderUsers();
}

// ===== LOGIN =====
function login(name){
currentUser = {name};
profileSetup();
}

// ===== PROFILE SETUP =====
function profileSetup(){
app.innerHTML = `
<div class="center">
<div class="card">
<h2>Dane</h2>

<div class="option" onclick="setData('plec','kobieta')">Kobieta</div>
<div class="option" onclick="setData('plec','mezczyzna')">Mężczyzna</div>

<div class="option" onclick="setData('cel','masa')">Masa</div>
<div class="option" onclick="setData('cel','redukcja')">Redukcja</div>

<div class="option" onclick="setData('poziom','poczatkujacy')">Początkujący</div>
<div class="option" onclick="setData('poziom','sredni')">Średni</div>

<button class="btn" onclick="generatePlan()">Generuj plan</button>
</div>
</div>`;
}

// ===== DATA =====
let data = {};
function setData(key,val){
data[key]=val;
}

// ===== PLAN GENERATOR =====
let plan;

function generatePlan(){

if(data.cel==="masa"){
plan={
"Push":[["Wyciskanie sztangi",4,"6-10"],["Dipy",3,"max"]],
"Pull":[["Podciąganie",4,"max"],["Wiosłowanie",4,"8-10"]],
"Legs":[["Przysiad",5,"5"],["RDL",4,"10"]]
};
}else{
plan={
"Full Body":[["Przysiad",4,"12"],["Pompki",4,"max"],["Plank",3,"30s"]]
};
}

chooseWorkout();
}

// ===== CHOOSE WORKOUT =====
function chooseWorkout(){
app.innerHTML=`<div class="center">
<h2>Wybierz trening</h2>
${Object.keys(plan).map(d=>`<div class="option" onclick="showWorkout('${d}')">${d}</div>`).join("")}
</div>`;
}

// ===== SHOW WORKOUT =====
function showWorkout(day){
app.innerHTML=`<div class="center">
<div class="card">
<h2>${day}</h2>

${plan[day].map((ex,i)=>`
<div class="exercise">
<strong>${ex[0]}</strong><br>
${ex[1]} serie × ${ex[2]}
<br>
KG: <input>
<div id="sets${i}"></div>
</div>`).join("")}

<div class="timerBox" id="timer">60</div>
<button class="btn" onclick="startTimer()">Start timer</button>

</div>
</div>`;

plan[day].forEach((ex,i)=>{
let container=document.getElementById("sets"+i);
for(let j=0;j<ex[1];j++){
let s=document.createElement("div");
s.className="set";
s.innerText="Seria "+(j+1);
s.onclick=()=>s.classList.toggle("done");
container.appendChild(s);
}
});
}

// ===== TIMER =====
function startTimer(){
let t=60;
let el=document.getElementById("timer");

let i=setInterval(()=>{
t--;
el.innerText=t;

if(t<10) el.style.color="red";

if(t<=0){
clearInterval(i);
el.innerText="✔";
}
},1000);
}

// ===== INIT =====
start();

</script>

</body>
</html>
