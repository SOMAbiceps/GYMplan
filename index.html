<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Planner Pro</title>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#e5e5e5;
}

#login {
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.box {
    background:white;
    padding:30px;
    border-radius:20px;
    width:300px;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    padding:12px;
    border:none;
    border-radius:12px;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#app {
    display:none;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:white;
}

.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:200px;
    height:100%;
    background:white;
    padding:20px;
}

.main {
    margin-left:220px;
    padding:20px;
}

.card {
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.timer {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    color:white;
    padding:20px;
    border-radius:50%;
}

.hidden { display:none; }

@media(max-width:768px){
    .sidebar {
        position:static;
        width:100%;
        height:auto;
    }
    .main {
        margin:0;
    }
}
</style>
</head>

<body>

<div id="login">
    <div class="box">
        <h2>Login</h2>
        <input id="user">
        <input id="pass" type="password">
        <button id="loginBtn">Zaloguj</button>
    </div>
</div>

<div id="app">
<header>
    <h3 id="welcome"></h3>
    <button id="logoutBtn">Wyloguj</button>
</header>

<div class="sidebar">
    <button data-plan="push">Push</button>
    <button data-plan="pull">Pull</button>
    <button data-plan="legs">Legs</button>
    <button data-plan="upper">Upper</button>
    <button data-plan="lower">Lower</button>
</div>

<div class="main">
    <div id="plan"></div>
</div>
</div>

<div id="timer" class="timer hidden">60</div>

<script>

// ELEMENTY (TO JEST KLUCZOWY FIX)
const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const userInput = document.getElementById("user");
const passInput = document.getElementById("pass");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const welcome = document.getElementById("welcome");
const planDiv = document.getElementById("plan");
const timer = document.getElementById("timer");

let timerInterval;

/* LOGIN */
loginBtn.onclick = () => {
    const u = userInput.value;
    const p = passInput.value;

    if(!u || !p) return alert("Wpisz dane");

    let users = JSON.parse(localStorage.getItem("users") || "{}");

    if(!users[u]) users[u] = p;

    if(users[u] !== p) return alert("Złe hasło");

    localStorage.setItem("users", JSON.stringify(users));

    welcome.innerText = "Cześć " + u;

    loginDiv.style.display = "none";
    appDiv.style.display = "block";
};

logoutBtn.onclick = () => {
    loginDiv.style.display = "flex";
    appDiv.style.display = "none";
};

/* PLANY */
const plans = {
push:["Bench Press","Incline Press","Shoulder Press","Lateral Raise","Triceps"],
pull:["Pull Ups","Row","Lat Pulldown","Face Pull","Biceps"],
legs:["Squat","Leg Press","RDL","Leg Curl","Calf"],
upper:["Bench","Row","Shoulders","Pull","Arms"],
lower:["Squat","Deadlift","Leg Curl","Extension","Calf"]
};

/* WYBÓR PLANU */
document.querySelectorAll(".sidebar button").forEach(btn=>{
    btn.onclick = () => loadPlan(btn.dataset.plan);
});

function loadPlan(type){
    planDiv.innerHTML = "";

    plans[type].forEach(ex=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h4>${ex}</h4>
            <input placeholder="kg">
            <input placeholder="powtórzenia">
            <button class="startBtn">Start</button>
        `;

        div.querySelector(".startBtn").onclick = startTimer;

        planDiv.appendChild(div);
    });
}

/* TIMER */
function startTimer(){
    let time = 60;
    timer.classList.remove("hidden");
    timer.innerText = time;

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
        time--;
        timer.innerText = time;

        if(time <= 0){
            clearInterval(timerInterval);
            timer.classList.add("hidden");
        }
    },1000);
}

</script>

</body>
</html>
