<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan 4.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#1f1f1f;
  color:#fff;
}

.app{display:flex}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#181818;
  padding:20px;
  height:100vh;
  box-sizing:border-box;
}

.plan-item{
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

/* MAIN */
.main{flex:1;padding:20px}

/* BUTTON */
.btn{
  background:#00ff88;
  border:none;
  padding:14px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* CARD */
.card{
  background:#2a2a2a;
  padding:20px;
  border-radius:14px;
  margin-bottom:15px;
}

/* SPLIT */
.split-btn{
  background:#333;
  padding:16px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
  font-weight:700;
  text-align:center;
}

.split-btn:hover{
  background:#00ff88;
  color:#000;
}

/* EXERCISE */
.exercise{
  background:#262626;
  padding:14px;
  border-radius:12px;
  margin-top:10px;
}

input{
  width:70px;
  padding:6px;
  border-radius:6px;
  border:none;
  margin-left:10px;
}

.timer{
  margin-top:8px;
  color:#00ff88;
  cursor:pointer;
  font-size:14px;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📁 Plany</h3>
  <div id="saved"></div>
  <button class="btn" onclick="reset()">+ Nowy</button>
</div>

<!-- MAIN -->
<div class="main">

<div id="start">
  <h1>FitPlan</h1>
  <p>Wybierz split</p>

  <div class="split-btn" onclick="generate('ppl')">Push / Pull / Legs</div>
  <div class="split-btn" onclick="generate('ul')">Upper / Lower</div>
</div>

<div id="plan"></div>

</div>
</div>

<script>

let currentPlan=null;

// GENERATE
function generate(type){

if(type==="ppl"){
currentPlan={
name:"PPL",
trainings:{
Push:[
["Wyciskanie sztangi",4,"6-10"],
["Wyciskanie hantli",4,"8-12"],
["Dipy",3,"max"],
["Barki bokiem",4,"12-15"],
["Triceps linka",3,"12-15"]
],
Pull:[
["Podciąganie",4,"max"],
["Wiosłowanie",4,"8-10"],
["Ściąganie drążka",3,"10-12"],
["Face pull",3,"15"],
["Biceps hantle",3,"10-12"]
],
Legs:[
["Przysiad",5,"5"],
["Leg press",4,"10"],
["RDL",4,"10"],
["Łydki",4,"15"],
["Hip thrust",4,"12"]
]
}
};
}

if(type==="ul"){
currentPlan={
name:"Upper/Lower",
trainings:{
Upper:[
["Wyciskanie sztangi",4,"6-10"],
["Podciąganie",4,"max"],
["Wiosłowanie",3,"10"],
["Barki bokiem",3,"15"],
["Biceps",3,"12"],
["Triceps",3,"12"]
],
Lower:[
["Przysiad",5,"5"],
["RDL",4,"10"],
["Leg press",4,"10"],
["Łydki",4,"15"],
["Hip thrust",4,"12"]
]
}
};
}

renderPlan();
save();
}

// RENDER
function renderPlan(){
const planDiv=document.getElementById("plan");
planDiv.innerHTML="";

Object.keys(currentPlan.trainings).forEach(day=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`<h2>${day}</h2>`;

currentPlan.trainings[day].forEach((ex,i)=>{
const div=document.createElement("div");
div.className="exercise";

const key=day+i;
const saved=localStorage.getItem(key)||"";

div.innerHTML=`
<strong>${ex[0]}</strong><br>
${ex[1]} serie × ${ex[2]}
<br><br>
KG: <input value="${saved}" oninput="saveWeight('${key}',this.value)">
<div class="timer" onclick="timer(this)">⏱ start</div>
`;

card.appendChild(div);
});

planDiv.appendChild(card);
});

document.getElementById("start").style.display="none";
}

// TIMER
function timer(el){
let t=60;
el.innerText=t+"s";

const i=setInterval(()=>{
t--;
el.innerText=t+"s";
if(t<=0){
clearInterval(i);
el.innerText="✔";
}
},1000);
}

// SAVE KG
function saveWeight(key,val){
localStorage.setItem(key,val);
}

// SAVE PLAN
function save(){
let arr=JSON.parse(localStorage.getItem("plans")||"[]");
arr.push(currentPlan);
localStorage.setItem("plans",JSON.stringify(arr));
renderSaved();
}

// SIDEBAR
function renderSaved(){
const el=document.getElementById("saved");
el.innerHTML="";

let arr=JSON.parse(localStorage.getItem("plans")||"[]");

arr.forEach(p=>{
const div=document.createElement("div");
div.className="plan-item";
div.innerText=p.name;
div.onclick=()=>{
currentPlan=p;
renderPlan();
};
el.appendChild(div);
});
}

// RESET
function reset(){
document.getElementById("start").style.display="block";
document.getElementById("plan").innerHTML="";
}

renderSaved();

</script>

</body>
</html>
