<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Planner Pro</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#1c1c1e;
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:32px;
}

.btn {
  background:#4ade80;
  color:black;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  margin-top:10px;
  font-size:16px;
}

.card {
  background:#2c2c2e;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#3a3a3c;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.exercise {
  background:#3a3a3c;
  padding:15px;
  border-radius:12px;
}

.timer {
  font-size:28px;
  text-align:center;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gym Planner</h1>

<!-- LOGIN -->
<div id="auth" class="card">
<h2>Konto</h2>
<input id="username" placeholder="Nazwa użytkownika">
<button class="btn" onclick="login()">Zaloguj</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<h2 id="welcome"></h2>
<button class="btn" onclick="logout()">Wyloguj</button>
</div>

<!-- WYBÓR PLANU -->
<div class="card">
<h2>Wybierz trening</h2>

<div class="grid">
<button class="btn" onclick="startWorkout('push')">Push</button>
<button class="btn" onclick="startWorkout('pull')">Pull</button>
<button class="btn" onclick="startWorkout('legs')">Legs</button>
<button class="btn" onclick="startWorkout('upper')">Upper</button>
<button class="btn" onclick="startWorkout('lower')">Lower</button>
</div>

</div>

<!-- TRENING -->
<div id="workout" class="card" style="display:none;">
<h2 id="workoutTitle"></h2>

<div id="exerciseList"></div>

<div class="timer" id="timer">60</div>
<button class="btn" onclick="startTimer()">Start odpoczynku</button>

</div>

</div>

</div>

<script>

let user = localStorage.getItem("user");

if(user){
  showApp(user);
}

function login(){
  let name = document.getElementById("username").value;
  if(name){
    localStorage.setItem("user", name);
    showApp(name);
  }
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(name){
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("welcome").innerText="Cześć " + name;
}

const plans = {
push:[
["Bench Press",4,8],
["Incline DB Press",4,10],
["Shoulder Press",4,8],
["Lateral Raises",4,12],
["Triceps Pushdown",4,12],
["Dips",3, max=12]
],
pull:[
["Pull Ups",4,8],
["Barbell Row",4,8],
["Lat Pulldown",4,10],
["Face Pull",4,12],
["Biceps Curl",4,10],
["Hammer Curl",3,12]
],
legs:[
["Squat",4,8],
["Leg Press",4,10],
["RDL",4,8],
["Leg Curl",4,12],
["Calf Raises",5,15]
],
upper:[
["Bench Press",4,8],
["Pull Ups",4,8],
["Shoulder Press",4,8],
["Row",4,10],
["Biceps",3,12],
["Triceps",3,12]
],
lower:[
["Squat",4,8],
["RDL",4,8],
["Leg Press",4,10],
["Leg Curl",4,12],
["Calves",5,15]
]
};

function startWorkout(type){
  document.getElementById("workout").style.display="block";
  document.getElementById("workoutTitle").innerText=type.toUpperCase();

  let list = document.getElementById("exerciseList");
  list.innerHTML="";

  plans[type].forEach(ex=>{
    let div=document.createElement("div");
    div.className="exercise";

    div.innerHTML = `
      <strong>${ex[0]}</strong><br>
      Serie: ${ex[1]} | Powtórzenia: ${ex[2]}<br>
      <input placeholder="kg">
      <input placeholder="powtórzenia">
    `;

    list.appendChild(div);
  });
}

let time=60;
let interval;

function startTimer(){
  clearInterval(interval);
  time=60;

  interval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=time;

    if(time<=0){
      clearInterval(interval);
      alert("Koniec odpoczynku!");
    }

  },1000);
}

</script>

</body>
</html>
