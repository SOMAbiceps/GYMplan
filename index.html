<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>FitPlan AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0d0d0d;
  color:#fff;
}

.wrap {
  max-width:600px;
  margin:auto;
  padding:30px 16px 80px;
}

h1 {
  text-align:center;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card {
  background:#161616;
  border:1.5px solid #2a2a2a;
  border-radius:14px;
  padding:18px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  border-color:#c8f045;
}

.card.active {
  border-color:#c8f045;
  background:rgba(200,240,69,0.08);
}

.btn {
  padding:12px 20px;
  border-radius:999px;
  font-weight:700;
  border:none;
  cursor:pointer;
  margin-top:20px;
}

.primary { background:#c8f045; color:#000; }
.secondary { background:#1e1e1e; color:#aaa; }

.progress {
  height:4px;
  background:#1e1e1e;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}

.bar {
  height:100%;
  background:#c8f045;
  width:0%;
  transition:0.3s;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #2a2a2a;
  background:#161616;
  color:#fff;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div class="wrap">
<h1>FitPlan AI</h1>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="app"></div>

</div>

<script>
const state = {
  step: 0,
  answers: {},
  user: null
};

// ─── LOGIN ───
function renderLogin() {
  app.innerHTML = `
    <h2>Twoje konto</h2>
    <input id="name" placeholder="Imię">
    <button class="btn primary" onclick="login()">Start</button>
  `;
}

function login() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Podaj imię");

  state.user = { name };
  localStorage.setItem("user", JSON.stringify(state.user));
  state.step = 1;
  render();
}

// ─── SELECT ───
function select(step, value) {
  state.answers[step] = value;
  render();
}

// ─── GENERATE ───
function generate() {
  const {1:plec, 2:cel, 6:waga} = state.answers;

  const kcal = Math.round(waga * 30);

  app.innerHTML = `
    <h2>🔥 Twój plan</h2>
    <p><b>${state.user.name}</b>, oto Twój plan:</p>

    <p>Cel: ${cel}</p>
    <p>Kcal: ${kcal}</p>

    <ul>
      <li>Trening 3x w tygodniu</li>
      <li>Hip thrust / bench / pull</li>
      <li>Cardio 2x</li>
    </ul>

    <button class="btn primary" onclick="reset()">Nowy plan</button>
  `;

  window.scrollTo({top:0, behavior:"smooth"});
}

// ─── RENDER ───
function render() {
  const app = document.getElementById("app");
  const bar = document.getElementById("bar");

  bar.style.width = (state.step/6)*100 + "%";

  if (!state.user) return renderLogin();

  if (state.step === 1) {
    app.innerHTML = `
      <h2>Kim jesteś?</h2>
      <div class="grid">
        <div class="card ${state.answers[1]=='kobieta'?'active':''}" onclick="select(1,'kobieta')">👩 Kobieta</div>
        <div class="card ${state.answers[1]=='mezczyzna'?'active':''}" onclick="select(1,'mezczyzna')">👨 Mężczyzna</div>
      </div>
      <button class="btn primary" onclick="state.step=2;render()">Dalej</button>
    `;
  }

  if (state.step === 2) {
    app.innerHTML = `
      <h2>Cel</h2>
      <div class="grid">
        <div class="card ${state.answers[2]=='masa'?'active':''}" onclick="select(2,'masa')">💪 Masa</div>
        <div class="card ${state.answers[2]=='redukcja'?'active':''}" onclick="select(2,'redukcja')">🔥 Redukcja</div>
      </div>
      <button class="btn secondary" onclick="state.step=1;render()">Wróć</button>
      <button class="btn primary" onclick="state.step=3;render()">Dalej</button>
    `;
  }

  if (state.step === 3) {
    app.innerHTML = `
      <h2>Wzrost (cm)</h2>
      <input id="h" placeholder="np. 180">
      <button class="btn primary" onclick="state.answers[5]=h.value;state.step=4;render()">Dalej</button>
    `;
  }

  if (state.step === 4) {
    app.innerHTML = `
      <h2>Waga (kg)</h2>
      <input id="w" placeholder="np. 80">
      <button class="btn primary" onclick="state.answers[6]=w.value;state.step=5;render()">Dalej</button>
    `;
  }

  if (state.step === 5) {
    app.innerHTML = `
      <h2>Ile dni?</h2>
      <div class="grid">
        <div class="card" onclick="select(7,2)">2 dni</div>
        <div class="card" onclick="select(7,3)">3 dni</div>
        <div class="card" onclick="select(7,4)">4+ dni</div>
      </div>
      <button class="btn primary" onclick="state.step=6;render()">Dalej</button>
    `;
  }

  if (state.step === 6) {
    generate();
  }
}

function reset() {
  state.step = 1;
  state.answers = {};
  render();
}

// ─── INIT ───
const savedUser = localStorage.getItem("user");
if (savedUser) {
  state.user = JSON.parse(savedUser);
  state.step = 1;
}

render();
</script>

</body>
</html>
