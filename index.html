<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gym App</title>

<style>
:root{
    --bg:#f1f1f1;
    --card:#ffffff;
    --accent:#ff3b3b;
    --text:#111;
}

*{
    box-sizing:border-box;
    font-family:-apple-system, BlinkMacSystemFont;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:340px;
    padding:35px;
    background:white;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-box h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:var(--accent);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.97);
}

/* APP */
#app{
    display:none;
}

header{
    padding:20px;
    font-size:20px;
    font-weight:600;
}

/* PLAN SELECT */
.plan-select{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px 20px;
}

.plan-btn{
    padding:12px 18px;
    border-radius:14px;
    background:white;
    white-space:nowrap;
    cursor:pointer;
}

.plan-btn.active{
    background:var(--accent);
    color:white;
}

/* CONTENT */
.main{
    padding:20px;
}

/* EXERCISE */
.exercise{
    background:var(--card);
    padding:20px;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    animation:fade .3s ease;
}

.exercise h3{
    margin:0 0 10px;
}

.row{
    display:flex;
    gap:10px;
}

.row input{
    flex:1;
}

.start{
    margin-top:10px;
}

/* TIMER */
.timer{
    position:fixed;
    bottom:25px;
    right:25px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    opacity:0;
    transform:scale(.8);
    transition:.3s;
}

.timer.show{
    opacity:1;
    transform:scale(1);
}

/* ANIM */
@keyframes fade{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h1>Gym App</h1>
        <input id="user" placeholder="Login">
        <input id="pass" type="password" placeholder="Hasło">
        <button id="loginBtn">Start</button>
    </div>
</div>

<!-- APP -->
<div id="app">
    <header id="welcome"></header>

    <div class="plan-select">
        <div class="plan-btn" data-plan="push">Push</div>
        <div class="plan-btn" data-plan="pull">Pull</div>
        <div class="plan-btn" data-plan="legs">Legs</div>
        <div class="plan-btn" data-plan="upper">Upper</div>
        <div class="plan-btn" data-plan="lower">Lower</div>
    </div>

    <div class="main" id="plan"></div>
</div>

<div id="timer" class="timer">60</div>

<script>

const loginDiv = document.getElementById("login");
const appDiv = document.getElementById("app");
const userInput = document.getElementById("user");
const passInput = document.getElementById("pass");
const loginBtn = document.getElementById("loginBtn");
const welcome = document.getElementById("welcome");
const planDiv = document.getElementById("plan");
const timer = document.getElementById("timer");

let timerInterval;

/* LOGIN */
loginBtn.onclick = ()=>{
    const u = userInput.value;
    const p = passInput.value;

    if(!u || !p) return;

    let users = JSON.parse(localStorage.getItem("users")||"{}");
    if(!users[u]) users[u]=p;
    if(users[u]!==p) return alert("Złe hasło");

    localStorage.setItem("users", JSON.stringify(users));

    loginDiv.style.display="none";
    appDiv.style.display="block";

    welcome.innerText="Cześć, "+u;
};

/* PLANY */
const plans={
push:["Bench Press","Incline DB Press","Shoulder Press","Lateral Raise","Triceps Pushdown"],
pull:["Pull Ups","Barbell Row","Lat Pulldown","Face Pull","Biceps Curl"],
legs:["Squat","Leg Press","RDL","Leg Curl","Calf Raise"],
upper:["Bench","Row","Shoulders","Pull","Arms"],
lower:["Squat","Deadlift","Leg Curl","Extension","Calf"]
};

document.querySelectorAll(".plan-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".plan-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        loadPlan(btn.dataset.plan);
    };
});

function loadPlan(type){
    planDiv.innerHTML="";

    plans[type].forEach(ex=>{
        const div=document.createElement("div");
        div.className="exercise";

        div.innerHTML=`
            <h3>${ex}</h3>
            <div class="row">
                <input placeholder="kg">
                <input placeholder="powt.">
            </div>
            <button class="start">Start serii</button>
        `;

        div.querySelector(".start").onclick=startTimer;

        planDiv.appendChild(div);
    });
}

/* TIMER */
function startTimer(){
    let time=60;

    timer.classList.add("show");
    timer.innerText=time;

    clearInterval(timerInterval);

    timerInterval=setInterval(()=>{
        time--;
        timer.innerText=time;

        if(time<=0){
            clearInterval(timerInterval);
            timer.classList.remove("show");
        }
    },1000);
}

</script>

</body>
</html>
