<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Planner Pro</title>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#e5e5e5;
    color:#111;
}

/* LOGIN */
#login {
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.box {
    background:white;
    padding:30px;
    border-radius:20px;
    width:300px;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    padding:12px;
    border:none;
    border-radius:12px;
    background:#ff3b3b;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* APP */
#app {
    display:none;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:white;
}

.sidebar {
    position:fixed;
    left:0;
    top:0;
    width:200px;
    height:100%;
    background:white;
    padding:20px;
}

.main {
    margin-left:220px;
    padding:20px;
}

/* KAFELKI */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card {
    background:white;
    padding:15px;
    border-radius:15px;
}

.exercise {
    margin-bottom:20px;
}

.timer {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    color:white;
    padding:20px;
    border-radius:50%;
    font-size:20px;
}

.hidden {
    display:none;
}

@media(max-width:768px){
    .sidebar {
        position:static;
        width:100%;
        height:auto;
    }
    .main {
        margin:0;
    }
    .grid {
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h2>Login</h2>
        <input id="user" placeholder="Login">
        <input id="pass" type="password" placeholder="Hasło">
        <button onclick="login()">Zaloguj</button>
    </div>
</div>

<!-- APP -->
<div id="app">
<header>
    <h3 id="welcome"></h3>
    <button onclick="logout()">Wyloguj</button>
</header>

<div class="sidebar">
    <h4>Plany</h4>
    <button onclick="loadPlan('push')">Push</button>
    <button onclick="loadPlan('pull')">Pull</button>
    <button onclick="loadPlan('legs')">Legs</button>
    <button onclick="loadPlan('upper')">Upper</button>
    <button onclick="loadPlan('lower')">Lower</button>
</div>

<div class="main">
    <div id="plan"></div>
</div>
</div>

<div id="timer" class="timer hidden">60</div>

<script>

let currentUser = null;
let timerInterval;

/* LOGIN */
function login(){
    const u = user.value;
    const p = pass.value;

    if(!u || !p) return alert("Wpisz dane");

    let users = JSON.parse(localStorage.getItem("users")||"{}");

    if(!users[u]) users[u] = p;

    if(users[u] !== p) return alert("Złe hasło");

    localStorage.setItem("users", JSON.stringify(users));

    currentUser = u;
    welcome.innerText = "Cześć " + u;

    loginDiv(false);
}

function logout(){
    currentUser=null;
    loginDiv(true);
}

function loginDiv(show){
    login.style.display = show ? "flex":"none";
    app.style.display = show ? "none":"block";
}

/* PLAN */
const plans = {
push:[
"Bench Press","Incline Dumbbell Press","Shoulder Press","Lateral Raise","Triceps Pushdown"
],
pull:[
"Pull Ups","Barbell Row","Lat Pulldown","Face Pull","Biceps Curl"
],
legs:[
"Squat","Leg Press","Romanian Deadlift","Leg Curl","Calf Raise"
],
upper:[
"Bench Press","Row","Shoulder Press","Pull Ups","Curls","Triceps"
],
lower:[
"Squat","Deadlift","Leg Curl","Leg Extension","Calf Raise"
]
};

function loadPlan(type){
    const planDiv = document.getElementById("plan");
    planDiv.innerHTML = "";

    plans[type].forEach(ex=>{
        const el = document.createElement("div");
        el.className="card";

        el.innerHTML = `
        <div class="exercise">
            <h4>${ex}</h4>
            <input placeholder="kg">
            <input placeholder="powtórzenia">
            <button onclick="startTimer()">Start</button>
        </div>
        `;

        planDiv.appendChild(el);
    });
}

/* TIMER */
function startTimer(){
    let time = 60;
    timer.classList.remove("hidden");
    timer.innerText = time;

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
        time--;
        timer.innerText = time;
        if(time<=0){
            clearInterval(timerInterval);
            timer.classList.add("hidden");
        }
    },1000);
}

</script>

</body>
</html>
