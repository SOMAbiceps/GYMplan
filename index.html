<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Planner Elite</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#18181a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  background:#202024;
  padding:20px;
}

.nav button {
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2c2c2e;
  color:white;
  cursor:pointer;
}

.nav button:hover {
  background:#4ade80;
  color:black;
}

/* MAIN */
.main {
  flex:1;
  padding:25px;
}

.card {
  background:#202024;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  animation:fade 0.3s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.exercise {
  background:#2c2c2e;
  padding:15px;
  border-radius:14px;
  transition:0.2s;
}

.done {
  background:#4ade80;
  color:black;
}

input {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3a3a3c;
  color:white;
}

.btn {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4ade80;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* TIMER */
.timerBox {
  text-align:center;
}

.timerCircle {
  width:130px;
  height:130px;
  border-radius:50%;
  border:6px solid #4ade80;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  margin:15px auto;
}

.timerControls button {
  margin:5px;
  padding:10px 12px;
  border:none;
  border-radius:8px;
  background:#3a3a3c;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Gym</h2>
<div class="nav">
<button onclick="show('home')">Start</button>
<button onclick="show('plans')">Plany</button>
<button onclick="show('account')">Konto</button>
</div>
</div>

<div class="main">

<div id="login" class="card">
<h2>Logowanie</h2>
<input id="username" placeholder="Nazwa">
<button class="btn" onclick="login()">Wejdź</button>
</div>

<div id="home" style="display:none;" class="card">
<h2 id="welcome"></h2>
</div>

<div id="plans" style="display:none;">
<div class="card">
<h2>Wybierz trening</h2>
<div class="grid">
<button class="btn" onclick="start('push')">Push</button>
<button class="btn" onclick="start('pull')">Pull</button>
<button class="btn" onclick="start('legs')">Legs</button>
<button class="btn" onclick="start('upper')">Upper</button>
<button class="btn" onclick="start('lower')">Lower</button>
</div>
</div>

<div id="workout"></div>

</div>

<div id="account" style="display:none;" class="card">
<button class="btn" onclick="logout()">Wyloguj</button>
</div>

</div>

<script>

let user = localStorage.getItem("user");

function show(page){
  ["home","plans","account"].forEach(p=>{
    document.getElementById(p).style.display="none";
  });
  document.getElementById(page).style.display="block";
}

function login(){
  let name = document.getElementById("username").value;
  if(!name) return;
  localStorage.setItem("user",name);
  user=name;
  init();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function init(){
  document.getElementById("login").style.display="none";
  show("home");
  document.getElementById("welcome").innerText="Cześć " + user;
}

if(user) init();

/* PLANY */
const plans={
push:[["Bench",4,8],["Incline",4,10],["Shoulder",4,8],["Lateral",4,12],["Triceps",4,12]],
pull:[["Pull Up",4,8],["Row",4,8],["Lat",4,10],["Face Pull",4,12],["Biceps",4,10]],
legs:[["Squat",4,8],["Press",4,10],["RDL",4,8],["Curl",4,12],["Calves",5,15]],
upper:[["Bench",4,8],["Pull",4,8],["Shoulder",4,8],["Row",4,10]],
lower:[["Squat",4,8],["RDL",4,8],["Press",4,10],["Curl",4,12]]
};

function start(type){

  let container=document.getElementById("workout");
  container.innerHTML="";

  let saved=JSON.parse(localStorage.getItem("progress")||"{}");

  let html=`<div class="card"><h2>${type.toUpperCase()}</h2><div class="grid">`;

  plans[type].forEach((ex,i)=>{

    let doneClass = saved?.[type]?.[i]?.done ? "done":"";

    html+=`
    <div class="exercise ${doneClass}" onclick="toggleDone(this,'${type}',${i})">
      <strong>${ex[0]}</strong><br>
      ${ex[1]}x${ex[2]}
      <input placeholder="kg" value="${saved?.[type]?.[i]?.kg||""}" 
      onchange="save('${type}',${i},this.value,'kg')">
      <input placeholder="powt." value="${saved?.[type]?.[i]?.reps||""}" 
      onchange="save('${type}',${i},this.value,'reps')">
    </div>`;
  });

  html+=`</div>

  <div class="timerBox">
    <div class="timerCircle" id="timer">60</div>

    <div class="timerControls">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="addTime(10)">+10s</button>
      <button onclick="addTime(30)">+30s</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  </div>`;

  container.innerHTML=html;
}

/* TIMER */
let time=60, interval=null;

function updateTimer(){
  document.getElementById("timer").innerText=time;
}

function startTimer(){
  if(interval) return;
  interval=setInterval(()=>{
    time--;
    updateTimer();
    if(time<=0){
      clearInterval(interval);
      interval=null;
    }
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
  interval=null;
}

function addTime(sec){
  time+=sec;
  updateTimer();
}

function resetTimer(){
  time=60;
  updateTimer();
  clearInterval(interval);
  interval=null;
}

/* SAVE */
function save(type,i,val,key){
  let data=JSON.parse(localStorage.getItem("progress")||"{}");
  if(!data[type]) data[type]={};
  if(!data[type][i]) data[type][i]={};
  data[type][i][key]=val;
  localStorage.setItem("progress",JSON.stringify(data));
}

/* DONE */
function toggleDone(el,type,i){
  el.classList.toggle("done");

  let data=JSON.parse(localStorage.getItem("progress")||"{}");
  if(!data[type]) data[type]={};
  if(!data[type][i]) data[type][i]={};

  data[type][i].done = !data[type][i].done;

  localStorage.setItem("progress",JSON.stringify(data));
}

</script>

</body>
</html>
