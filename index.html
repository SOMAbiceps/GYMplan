<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan AI</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui;
  background:#0b0b0f;
  color:#fff;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  padding:20px 16px 80px;
}

h1{
  font-size:28px;
  font-weight:800;
  text-align:center;
}

.sub{
  text-align:center;
  color:#777;
  font-size:13px;
  margin-bottom:25px;
}

.progress{
  height:4px;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:25px;
}
.bar{
  height:100%;
  width:33%;
  background:linear-gradient(90deg,#c8f045,#00ffd5);
  transition:0.3s;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:rgba(255,255,255,0.04);
  border:1px solid #222;
  border-radius:14px;
  padding:18px 10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{border-color:#c8f045}
.card.active{
  border:2px solid #c8f045;
  background:rgba(200,240,69,0.1);
}

.icon{font-size:26px;margin-bottom:6px}
.label{font-weight:600;font-size:13px}

.btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:999px;
  font-weight:700;
  background:linear-gradient(90deg,#c8f045,#00ffd5);
  color:#000;
  cursor:pointer;
}

.btn:disabled{
  background:#222;
  color:#555;
}

.step{display:none}
.step.active{display:block}

.header{
  margin-bottom:30px;
}

.premium{
  background:linear-gradient(90deg,#c8f045,#00ffd5);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>FitPlan <span class="premium">AI</span></h1>
  <div class="sub">Twój personalny plan treningowy</div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <h2>Kim jesteś?</h2>
  <div class="grid">
    <div class="card" onclick="select(1,'kobieta',this)">👩<div>Kobieta</div></div>
    <div class="card" onclick="select(1,'mezczyzna',this)">👨<div>Mężczyzna</div></div>
  </div>
  <button class="btn" id="next1" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Co chcesz rozwinąć?</h2>
  <div class="grid" id="goals"></div>
  <button class="btn" id="next2" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <h2>Twój poziom?</h2>
  <div class="grid">
    <div class="card" onclick="select(3,'poczatkujacy',this)">🌱 Początkujący</div>
    <div class="card" onclick="select(3,'sredni',this)">💪 Średni</div>
    <div class="card" onclick="select(3,'zaawansowany',this)">🔥 Zaawansowany</div>
  </div>
  <button class="btn" id="next3" disabled onclick="finish()">Generuj plan</button>
</div>

<!-- RESULT -->
<div class="step" id="result">
  <h2>🔥 Twój plan</h2>
  <p id="planText"></p>
</div>

</div>

<script>
let step = 1;
let answers = {};

const GOALS = {
  kobieta:[
    {v:"posladki",t:"🍑 Pośladki"},
    {v:"brzuch",t:"⚡ Brzuch"},
    {v:"cale",t:"✨ Całe ciało"},
    {v:"ramiona",t:"💪 Ramiona"},
    {v:"redukcja",t:"🔥 Redukcja"},
    {v:"kondycja",t:"🏃 Kondycja"},
  ],
  mezczyzna:[
    {v:"klatka",t:"🦁 Klatka"},
    {v:"plecy",t:"💪 Plecy"},
    {v:"nogi",t:"🦵 Nogi"},
    {v:"barki",t:"🔱 Barki"},
    {v:"masa",t:"⚡ Masa"},
    {v:"rzezba",t:"🔥 Rzeźba"},
  ]
};

function select(s,val,el){
  answers[s]=val;

  document.querySelectorAll(`#step${s} .card`).forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("next"+s).disabled=false;

  if(s===1) renderGoals();
}

function renderGoals(){
  const box=document.getElementById("goals");
  box.innerHTML="";
  GOALS[answers[1]].forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=g.t;
    div.onclick=()=>select(2,g.v,div);
    box.appendChild(div);
  });
}

function next(){
  document.getElementById("step"+step).classList.remove("active");
  step++;
  document.getElementById("step"+step).classList.add("active");

  document.getElementById("bar").style.width=(step*33)+"%";
}

function finish(){
  document.getElementById("step"+step).classList.remove("active");
  document.getElementById("result").classList.add("active");

  document.getElementById("bar").style.width="100%";

  document.getElementById("planText").innerHTML = `
    Płeć: ${answers[1]} <br>
    Cel: ${answers[2]} <br>
    Poziom: ${answers[3]} <br><br>
    👉 Tutaj możesz podpiąć swoje PLANS z Reacta i generować pełny plan.
  `;
}
</script>

</body>
</html>
