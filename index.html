<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>FitPlan AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0d0d0d;
  color: #f0f0f0;
}
.wrap {
  max-width: 600px;
  margin: auto;
  padding: 30px 16px 80px;
}
.card {
  background: #161616;
  border: 1.5px solid #2a2a2a;
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
}
.card.active {
  border-color: #c8f045;
  background: rgba(200,240,69,0.07);
}
.btn {
  padding: 12px 22px;
  border-radius: 99px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}
.primary { background: #c8f045; color: #000; }
.secondary { background: transparent; color: #666; border: 1px solid #2a2a2a; }

.progress {
  height: 3px;
  background: #1e1e1e;
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 20px;
}
.progress-bar {
  height: 100%;
  background: #c8f045;
  width: 0%;
  transition: 0.3s;
}
</style>
</head>

<body>
<div class="wrap">

<h1>FitPlan AI</h1>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="app"></div>

</div>

<script>
const state = {
  step: 1,
  answers: {},
  plan: null,
  loading: false
};

const GOALS = {
  kobieta: [
    { value: "posladki", label: "🍑 Pośladki" },
    { value: "brzuch", label: "⚡ Brzuch" }
  ],
  mezczyzna: [
    { value: "klatka", label: "🦁 Klatka" },
    { value: "plecy", label: "💪 Plecy" }
  ]
};

const PLANS = {
  kobieta_posladki: {
    opis: "Plan na pośladki 🔥",
    trening: ["Hip thrust 4x12", "RDL 4x10", "Wykroki 3x10"]
  },
  mezczyzna_klatka: {
    opis: "Plan na klatkę 💪",
    trening: ["Bench press 5x5", "Incline DB 4x10", "Dipy 3x10"]
  }
};

function save() {
  localStorage.setItem("fitplan", JSON.stringify(state.plan));
}

function load() {
  const saved = localStorage.getItem("fitplan");
  if (saved) {
    state.plan = JSON.parse(saved);
    render();
  }
}

function select(key, value) {
  state.answers[key] = value;
  render();
}

function next() {
  state.step++;
  render();
}

function back() {
  state.step--;
  render();
}

function generate() {
  state.loading = true;
  render();

  setTimeout(() => {
    const key = state.answers[1] + "_" + state.answers[2];
    state.plan = PLANS[key];
    state.loading = false;
    save();
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, 500);
}

function render() {
  const app = document.getElementById("app");
  const bar = document.getElementById("bar");
  bar.style.width = ((state.step - 1) / 5) * 100 + "%";

  if (state.loading) {
    app.innerHTML = "<p>Generowanie planu...</p>";
    return;
  }

  if (state.plan) {
    app.innerHTML = `
      <h2>Twój plan</h2>
      <p>${state.plan.opis}</p>
      <ul>
        ${state.plan.trening.map(t => `<li>${t}</li>`).join("")}
      </ul>
      <button class="btn primary" onclick="reset()">Nowy plan</button>
    `;
    return;
  }

  if (state.step === 1) {
    app.innerHTML = `
      <h2>Kim jesteś?</h2>
      <div onclick="select(1,'kobieta')" class="card">👩 Kobieta</div>
      <div onclick="select(1,'mezczyzna')" class="card">👨 Mężczyzna</div>
      <br>
      <button class="btn primary" onclick="next()">Dalej</button>
    `;
  }

  if (state.step === 2) {
    const goals = GOALS[state.answers[1]] || [];
    app.innerHTML = `
      <h2>Cel</h2>
      ${goals.map(g => `<div class="card" onclick="select(2,'${g.value}')">${g.label}</div>`).join("")}
      <br>
      <button class="btn secondary" onclick="back()">Wróć</button>
      <button class="btn primary" onclick="next()">Dalej</button>
    `;
  }

  if (state.step === 3) {
    app.innerHTML = `
      <h2>Poziom</h2>
      <div class="card" onclick="select(3,'poczatkujacy')">🌱 Początkujący</div>
      <div class="card" onclick="select(3,'sredni')">💪 Średni</div>
      <div class="card" onclick="select(3,'zaawansowany')">🔥 Zaawansowany</div>
      <br>
      <button class="btn secondary" onclick="back()">Wróć</button>
      <button class="btn primary" onclick="next()">Dalej</button>
    `;
  }

  if (state.step === 4) {
    app.innerHTML = `
      <h2>Miejsce</h2>
      <div class="card" onclick="select(4,'silownia')">🏋️ Siłownia</div>
      <div class="card" onclick="select(4,'dom')">🏠 Dom</div>
      <br>
      <button class="btn secondary" onclick="back()">Wróć</button>
      <button class="btn primary" onclick="next()">Dalej</button>
    `;
  }

  if (state.step === 5) {
    app.innerHTML = `
      <h2>Dni treningowe</h2>
      <div class="card" onclick="select(5,'2')">2 dni</div>
      <div class="card" onclick="select(5,'3')">3 dni</div>
      <div class="card" onclick="select(5,'4')">4+ dni</div>
      <br>
      <button class="btn secondary" onclick="back()">Wróć</button>
      <button class="btn primary" onclick="generate()">Generuj</button>
    `;
  }
}

function reset() {
  state.step = 1;
  state.answers = {};
  state.plan = null;
  render();
}

load();
render();
</script>

</body>
</html>
