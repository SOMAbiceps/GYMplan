<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan 5.0</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#1f1f1f;
  color:#fff;
}

/* CENTER */
.center{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* INPUT */
input{
  padding:12px;
  margin:5px;
  border-radius:10px;
  border:none;
  width:220px;
}

/* BUTTON */
.btn{
  padding:14px 22px;
  border:none;
  border-radius:12px;
  background:#00ff88;
  color:#000;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* CARD */
.card{
  background:#2a2a2a;
  padding:20px;
  border-radius:16px;
  margin:10px;
  width:90%;
  max-width:420px;
}

/* SPLIT */
.option{
  background:#333;
  padding:16px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:center;
  cursor:pointer;
}

.option:hover{
  background:#00ff88;
  color:#000;
}

/* COUNTDOWN */
#countdown{
  font-size:80px;
  text-align:center;
}

/* TRAINING */
.exercise{
  text-align:center;
}

.set{
  background:#262626;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
}

.done{
  background:#00ff88;
  color:#000;
}

.timer{
  margin-top:10px;
  color:#00ff88;
  cursor:pointer;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

let user = localStorage.getItem("user");

// ---------- LOGIN ----------
function loginView(){
app.innerHTML=`
<div class="center">
<h1>FitPlan</h1>
<input id="login" placeholder="Login">
<input id="pass" placeholder="Hasło" type="password">
<button class="btn" onclick="login()">Zaloguj</button>
</div>`;
}

function login(){
let u=document.getElementById("login").value;
if(!u) return;

localStorage.setItem("user",u);
user=u;
home();
}

function logout(){
localStorage.removeItem("user");
loginView();
}

// ---------- HOME ----------
function home(){
app.innerHTML=`
<div class="topbar">
<div>${user}</div>
<button onclick="logout()">Wyloguj</button>
</div>

<div class="center">
<h2>Wybierz split</h2>

<div class="option" onclick="selectSplit('ppl')">Push Pull Legs</div>
<div class="option" onclick="selectSplit('ul')">Upper Lower</div>

</div>`;
}

// ---------- SPLIT ----------
let currentPlan;

function selectSplit(type){

if(type==="ppl"){
currentPlan={
Push:[
["Wyciskanie sztangi",4,"6-10"],
["Wyciskanie hantli",4,"8-12"],
["Dipy",3,"max"]
],
Pull:[
["Podciąganie",4,"max"],
["Wiosłowanie",4,"8-10"],
["Biceps",3,"12"]
],
Legs:[
["Przysiad",5,"5"],
["RDL",4,"10"],
["Łydki",4,"15"]
]
};
}

if(type==="ul"){
currentPlan={
Upper:[
["Wyciskanie",4,"8"],
["Podciąganie",4,"max"],
["Barki",3,"12"]
],
Lower:[
["Przysiad",5,"5"],
["RDL",4,"10"],
["Łydki",4,"15"]
]
};
}

chooseDay();
}

// ---------- CHOOSE DAY ----------
function chooseDay(){

app.innerHTML=`
<div class="center">
<h2>Wybierz trening</h2>
</div>`;

Object.keys(currentPlan).forEach(day=>{
let div=document.createElement("div");
div.className="option";
div.innerText=day;
div.onclick=()=>startCountdown(day);
app.appendChild(div);
});
}

// ---------- COUNTDOWN ----------
function startCountdown(day){

app.innerHTML=`<div id="countdown">3</div>`;

let c=3;
let i=setInterval(()=>{
c--;
document.getElementById("countdown").innerText=c;

if(c===0){
clearInterval(i);
startWorkout(day);
}
},800);
}

// ---------- WORKOUT ----------
let exIndex=0;
let setDone=0;
let currentDay;

function startWorkout(day){
currentDay=day;
exIndex=0;
setDone=0;
showExercise();
}

function showExercise(){

let ex=currentPlan[currentDay][exIndex];

app.innerHTML=`
<div class="topbar">
<div>${currentDay}</div>
<button onclick="home()">X</button>
</div>

<div class="center">

<div class="card">
<div class="exercise">
<h2>${ex[0]}</h2>
<p>${ex[1]} serie × ${ex[2]}</p>

<input id="kg" placeholder="KG">

<div id="sets"></div>

<div class="timer" onclick="timer(this)">⏱ timer</div>

</div>
</div>

</div>
`;

let setsDiv=document.getElementById("sets");

for(let i=0;i<ex[1];i++){
let s=document.createElement("div");
s.className="set";
s.innerText="Seria "+(i+1);
s.onclick=()=>{
s.classList.toggle("done");
};
setsDiv.appendChild(s);
}
}

// TIMER
function timer(el){
let t=60;
el.innerText=t;

let i=setInterval(()=>{
t--;
el.innerText=t;
if(t<=0){
clearInterval(i);
el.innerText="✔";
}
},1000);
}

// INIT
if(user){
home();
}else{
loginView();
}

</script>

</body>
</html>
