<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0c0c0f;
  color:#fff;
}

.app{
  max-width:520px;
  margin:auto;
  padding:30px 20px 120px;
}

h1{font-size:34px;margin-bottom:5px}
.sub{color:#777;margin-bottom:20px}

.progress{height:6px;background:#1a1a1a;border-radius:10px;margin-bottom:25px}
.bar{height:100%;width:20%;background:#00e0a4;border-radius:10px;transition:.4s}

.step{display:none}
.step.active{display:block}

.grid{display:grid;gap:14px}

.card{
  background:#16161c;
  padding:20px;
  border-radius:16px;
  border:2px solid transparent;
  cursor:pointer;
}
.card.active{border-color:#00e0a4;background:#1f2a28}

.btn{
  width:100%;
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#00e0a4;
  color:#000;
  font-weight:700;
}
.btn:disabled{background:#333;color:#666}

.section{
  background:#16161c;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
}

.exercise{
  padding:10px 0;
  border-bottom:1px solid #222;
}

.level{
  margin-top:10px;
  padding:12px;
  background:#111;
  border-radius:12px;
  border-left:4px solid #00e0a4;
}
</style>
</head>

<body>

<div class="app">

<h1>FitPlan</h1>
<div class="sub">Plan dopasowany do Ciebie</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>Płeć</h2>
<div class="grid">
<div class="card" onclick="select(1,'kobieta',this)">👩 Kobieta</div>
<div class="card" onclick="select(1,'mezczyzna',this)">👨 Mężczyzna</div>
</div>
<button class="btn" id="next1" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>Cel</h2>
<div class="grid" id="goals"></div>
<button class="btn" id="next2" disabled onclick="next()">Dalej</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>Poziom</h2>
<div class="grid">
<div class="card" onclick="select(3,'poczatkujacy',this)">Początkujący</div>
<div class="card" onclick="select(3,'sredni',this)">Średni</div>
<div class="card" onclick="select(3,'zaawansowany',this)">Zaawansowany</div>
</div>
<button class="btn" id="next3" disabled onclick="finish()">Generuj</button>
</div>

<!-- RESULT -->
<div class="step" id="result"></div>

</div>

<script>
let step=1;
let answers={};

const GOALS={
kobieta:["🍑 Pośladki","⚡ Brzuch","✨ Całe ciało","💪 Góra ciała","🦵 Dół ciała"],
mezczyzna:["🦁 Klatka","💪 Plecy","🦵 Nogi","🔥 Góra ciała","⚡ Całe ciało"]
};

const PLANS={
"🍑 Pośladki":[
["Hip Thrust 4x12","RDL 4x10","Wykroki 3x10","Kickback 3x12"],
["Hip Thrust 5x10","Przysiad 4x8","RDL 4x10","Odwodzenie 3x15"],
["Hip Thrust ciężko 5x5","Przysiad 5x5","RDL 5x8","Glute bridge 4x12"]
],

"💪 Plecy":[
["Ściąganie drążka 4x12","Wiosłowanie 3x12","Face pull 3x15"],
["Podciąganie 4x8","Wiosłowanie 4x10","Face pull 3x15"],
["Podciąganie z ciężarem","Wiosłowanie ciężko","Martwy ciąg"]
],

"🔥 Góra ciała":[
["Pompki","Wiosłowanie","Plank"],
["Wyciskanie","Podciąganie","Barki"],
["Bench press","OHP","Pull up + ciężar"]
],

"⚡ Całe ciało":[
["Przysiad","Pompki","Plank"],
["Przysiad + ciężar","Wyciskanie","Wiosło"],
["Full body heavy split"]
]
};

function select(s,val,el){
answers[s]=val;
document.querySelectorAll(`#step${s} .card`).forEach(c=>c.classList.remove("active"));
el.classList.add("active");
document.getElementById("next"+s).disabled=false;

if(s===1) renderGoals();
}

function renderGoals(){
let box=document.getElementById("goals");
box.innerHTML="";
GOALS[answers[1]].forEach(g=>{
let d=document.createElement("div");
d.className="card";
d.innerText=g;
d.onclick=()=>select(2,g,d);
box.appendChild(d);
});
}

function next(){
document.getElementById("step"+step).classList.remove("active");
step++;
document.getElementById("step"+step).classList.add("active");
document.getElementById("bar").style.width=(step*33)+"%";
}

function finish(){
document.getElementById("step"+step).classList.remove("active");
document.getElementById("result").classList.add("active");

let goal=answers[2];
let levelIndex = answers[3]==="poczatkujacy"?0:answers[3]==="sredni"?1:2;
let plan = PLANS[goal] || PLANS["⚡ Całe ciało"];

let html = `
<div class="section">
<h2>${goal}</h2>
</div>
`;

["Początkujący","Średni","Zaawansowany"].forEach((lvl,i)=>{
html+=`
<div class="section">
<h3>${lvl}</h3>
<div class="level">
${plan[i].map(e=>`<div class="exercise">${e}</div>`).join("")}
</div>
</div>
`;
});

document.getElementById("result").innerHTML=html;
}
</script>

</body>
</html>
